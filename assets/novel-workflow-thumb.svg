<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="50%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    
    <!-- 主渐变 - 蓝绿创作灵感 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="50%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    
    <!-- 辅助渐变 - 紫蓝色 -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 网格图案 -->
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(45,212,191,0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- 科技网格 -->
  <rect width="1200" height="800" fill="url(#grid)"/>
  
  <!-- 装饰性光晕 -->
  <circle cx="200" cy="300" r="250" fill="url(#mainGradient)" opacity="0.08" filter="url(#glow)"/>
  <circle cx="1000" cy="500" r="300" fill="url(#accentGradient)" opacity="0.08" filter="url(#glow)"/>
  
  <!-- 中心图标 - DNA 双螺旋 + 书本 -->
  <g transform="translate(600, 380)" filter="url(#glow)">
    <!-- 外环 -->
    <circle r="120" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.4"/>
    <circle r="90" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.6"/>
    
    <!-- DNA 双螺旋结构 -->
    <path d="M -40 -60 Q -20 -30 -40 0 Q -20 30 -40 60" stroke="url(#mainGradient)" stroke-width="4" fill="none" opacity="0.8"/>
    <path d="M 40 -60 Q 20 -30 40 0 Q 20 30 40 60" stroke="url(#accentGradient)" stroke-width="4" fill="none" opacity="0.8"/>
    
    <!-- 连接线 -->
    <line x1="-40" y1="-60" x2="40" y2="-60" stroke="url(#mainGradient)" stroke-width="2" opacity="0.5"/>
    <line x1="-40" y1="-30" x2="40" y2="-30" stroke="url(#mainGradient)" stroke-width="2" opacity="0.5"/>
    <line x1="-40" y1="0" x2="40" y2="0" stroke="url(#mainGradient)" stroke-width="2" opacity="0.5"/>
    <line x1="-40" y1="30" x2="40" y2="30" stroke="url(#mainGradient)" stroke-width="2" opacity="0.5"/>
    <line x1="-40" y1="60" x2="40" y2="60" stroke="url(#mainGradient)" stroke-width="2" opacity="0.5"/>
    
    <!-- 中心光点 -->
    <circle r="15" fill="url(#mainGradient)" filter="url(#glow)"/>
  </g>
  
  <!-- 装饰元素 - 分层写作图标 -->
  <g transform="translate(250, 250)" opacity="0.5">
    <rect x="-30" y="-20" width="60" height="40" rx="4" fill="none" stroke="url(#mainGradient)" stroke-width="2" filter="url(#glow)"/>
    <rect x="-25" y="-15" width="60" height="40" rx="4" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.7"/>
    <rect x="-20" y="-10" width="60" height="40" rx="4" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.4"/>
  </g>
  
  <g transform="translate(950, 550)" opacity="0.5">
    <rect x="-30" y="-20" width="60" height="40" rx="4" fill="none" stroke="url(#accentGradient)" stroke-width="2" filter="url(#glow)"/>
    <rect x="-25" y="-15" width="60" height="40" rx="4" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.7"/>
    <rect x="-20" y="-10" width="60" height="40" rx="4" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.4"/>
  </g>
  
  <!-- 情绪曲线装饰 -->
  <path d="M 150 600 Q 250 550 350 580 T 550 560 T 750 600 T 950 550" stroke="url(#mainGradient)" stroke-width="2" fill="none" opacity="0.3" filter="url(#glow)">
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite"/>
  </path>
  
  <!-- 数据流线条 -->
  <g stroke="url(#mainGradient)" stroke-width="1.5" opacity="0.3" filter="url(#glow)">
    <path d="M 150 150 L 250 180 L 280 220">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 1050 180 L 950 200 L 920 240">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 180 650 L 280 600 L 310 570">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 1020 620 L 920 580 L 890 550">
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- 标题文字 -->
  <text x="600" y="100" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="800" fill="url(#mainGradient)" filter="url(#glow)" letter-spacing="2">AI NOVEL WORKFLOW</text>
  
  <!-- 副标题 -->
  <text x="600" y="135" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" fill="rgba(255,255,255,0.5)" letter-spacing="4">AI 小说创作工作流系统</text>
  
  <!-- 功能标签 -->
  <g transform="translate(600, 680)" text-anchor="middle">
    <rect x="-200" y="-20" width="130" height="40" rx="20" fill="rgba(45,212,191,0.1)" stroke="url(#mainGradient)" stroke-width="1.5"/>
    <text x="-135" y="5" font-size="12" fill="url(#mainGradient)" font-weight="500">🧬 DNA 档案</text>
    
    <rect x="-55" y="-20" width="130" height="40" rx="20" fill="rgba(129,140,248,0.1)" stroke="url(#accentGradient)" stroke-width="1.5"/>
    <text x="10" y="5" font-size="12" fill="url(#accentGradient)" font-weight="500">📊 情绪节拍</text>
    
    <rect x="85" y="-20" width="130" height="40" rx="20" fill="rgba(45,212,191,0.1)" stroke="url(#mainGradient)" stroke-width="1.5"/>
    <text x="150" y="5" font-size="12" fill="url(#mainGradient)" font-weight="500">📝 分层写作</text>
  </g>
  
  <!-- 底部装饰条 -->
  <rect x="0" y="780" width="1200" height="2" fill="url(#mainGradient)" opacity="0.4"/>
  
  <!-- 角落装饰 -->
  <g stroke="url(#mainGradient)" stroke-width="2" fill="none" opacity="0.4">
    <path d="M 40 40 L 80 40 L 80 70 M 40 40 L 40 80 L 60 80"/>
    <path d="M 1160 40 L 1120 40 L 1120 70 M 1160 40 L 1160 80 L 1140 80"/>
    <path d="M 40 760 L 80 760 L 80 730 M 40 760 L 40 720 L 60 720"/>
    <path d="M 1160 760 L 1120 760 L 1120 730 M 1160 760 L 1160 720 L 1140 720"/>
  </g>
</svg>
