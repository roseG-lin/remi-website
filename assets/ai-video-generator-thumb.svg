<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变 - 赛博朋克风格 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a0a1a"/>
      <stop offset="100%" style="stop-color:#0a1a1a"/>
    </linearGradient>
    
    <!-- 主渐变 - 霓虹粉 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff"/>
      <stop offset="50%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    
    <!-- 辅助渐变 - 青色 -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 网格图案 -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,0,255,0.06)" stroke-width="1"/>
    </pattern>
    
    <!-- 扫描线图案 -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- 科技网格 -->
  <rect width="1200" height="800" fill="url(#grid)"/>
  
  <!-- 扫描线效果 -->
  <rect width="1200" height="800" fill="url(#scanlines)"/>
  
  <!-- 装饰性光晕 -->
  <circle cx="200" cy="300" r="250" fill="url(#mainGradient)" opacity="0.08" filter="url(#glow)"/>
  <circle cx="1000" cy="500" r="300" fill="url(#accentGradient)" opacity="0.08" filter="url(#glow)"/>
  
  <!-- 中心图标 - 视频播放按钮 + AI 元素 -->
  <g transform="translate(600, 380)" filter="url(#glow)">
    <!-- 外环动画 -->
    <circle r="140" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.3">
      <animate attributeName="stroke-dasharray" values="0 880;880 0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="110" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.4"/>
    <circle r="80" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.6"/>
    
    <!-- 播放按钮 -->
    <polygon points="-25,-35 -25,35 35,0" fill="url(#mainGradient)" filter="url(#glow)"/>
    
    <!-- 装饰圆点 -->
    <circle cx="0" cy="-60" r="8" fill="url(#accentGradient)"/>
    <circle cx="52" cy="-30" r="6" fill="url(#mainGradient)"/>
    <circle cx="52" cy="30" r="6" fill="url(#mainGradient)"/>
    <circle cx="0" cy="60" r="8" fill="url(#accentGradient)"/>
    <circle cx="-52" cy="30" r="6" fill="url(#mainGradient)"/>
    <circle cx="-52" cy="-30" r="6" fill="url(#mainGradient)"/>
  </g>
  
  <!-- 视频帧装饰 -->
  <g transform="translate(250, 280)" opacity="0.5">
    <rect x="-40" y="-30" width="80" height="60" rx="6" fill="none" stroke="url(#mainGradient)" stroke-width="2" filter="url(#glow)"/>
    <polygon points="-15,-10 -15,10 5,0" fill="url(#mainGradient)" opacity="0.6"/>
  </g>
  
  <g transform="translate(950, 520)" opacity="0.5">
    <rect x="-40" y="-30" width="80" height="60" rx="6" fill="none" stroke="url(#accentGradient)" stroke-width="2" filter="url(#glow)"/>
    <polygon points="-15,-10 -15,10 5,0" fill="url(#accentGradient)" opacity="0.6"/>
  </g>
  
  <!-- AI 生图图标 -->
  <g transform="translate(200, 550)" opacity="0.6">
    <rect x="-25" y="-25" width="50" height="50" rx="8" fill="none" stroke="url(#accentGradient)" stroke-width="2" filter="url(#glow)"/>
    <circle cx="0" cy="-5" r="10" fill="none" stroke="url(#accentGradient)" stroke-width="2"/>
    <path d="M -15 10 L -5 0 L 5 8 L 15 -5" fill="none" stroke="url(#accentGradient)" stroke-width="2"/>
  </g>
  
  <!-- 配音图标 -->
  <g transform="translate(1000, 250)" opacity="0.6">
    <path d="M -15 -10 L -15 15 Q -15 25 -5 25 L 5 25 Q 15 25 15 15 L 15 -10" fill="none" stroke="url(#mainGradient)" stroke-width="2" filter="url(#glow)"/>
    <path d="M -25 -10 Q -30 5 -25 20" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.5"/>
    <path d="M 25 -10 Q 30 5 25 20" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- 数据流线条 -->
  <g stroke="url(#mainGradient)" stroke-width="1.5" opacity="0.3" filter="url(#glow)">
    <path d="M 150 150 L 250 180 L 280 220">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 1050 180 L 950 200 L 920 240">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 180 650 L 280 600 L 310 570">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 1020 620 L 920 580 L 890 550">
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- 平台比例标签 -->
  <g transform="translate(600, 580)" text-anchor="middle">
    <rect x="-150" y="-20" width="90" height="40" rx="20" fill="rgba(255,0,255,0.1)" stroke="url(#mainGradient)" stroke-width="1.5"/>
    <text x="-105" y="5" font-size="11" fill="url(#mainGradient)" font-weight="500">📱 9:16 竖屏</text>
    
    <rect x="-50" y="-20" width="90" height="40" rx="20" fill="rgba(0,255,255,0.1)" stroke="url(#accentGradient)" stroke-width="1.5"/>
    <text x="-5" y="5" font-size="11" fill="url(#accentGradient)" font-weight="500">🖥️ 16:9 横屏</text>
    
    <rect x="50" y="-20" width="90" height="40" rx="20" fill="rgba(255,0,255,0.1)" stroke="url(#mainGradient)" stroke-width="1.5"/>
    <text x="95" y="5" font-size="11" fill="url(#mainGradient)" font-weight="500">📷 1:1 方形</text>
  </g>
  
  <!-- 标题文字 -->
  <text x="600" y="100" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="800" fill="url(#mainGradient)" filter="url(#glow)" letter-spacing="2">AI VIDEO GENERATOR</text>
  
  <!-- 副标题 -->
  <text x="600" y="135" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" fill="rgba(255,255,255,0.5)" letter-spacing="4">AI 视频生成工具 - 零门槛创作专业视频</text>
  
  <!-- 功能标签 -->
  <g transform="translate(600, 650)" text-anchor="middle">
    <rect x="-180" y="-20" width="110" height="40" rx="20" fill="rgba(255,0,255,0.1)" stroke="url(#mainGradient)" stroke-width="1.5"/>
    <text x="-125" y="5" font-size="12" fill="url(#mainGradient)" font-weight="500">🎬 文生视频</text>
    
    <rect x="-55" y="-20" width="110" height="40" rx="20" fill="rgba(0,255,255,0.1)" stroke="url(#accentGradient)" stroke-width="1.5"/>
    <text x="0" y="5" font-size="12" fill="url(#accentGradient)" font-weight="500">🎨 AI 生图</text>
    
    <rect x="70" y="-20" width="110" height="40" rx="20" fill="rgba(255,0,255,0.1)" stroke="url(#mainGradient)" stroke-width="1.5"/>
    <text x="125" y="5" font-size="12" fill="url(#mainGradient)" font-weight="500">🎙️ 智能配音</text>
  </g>
  
  <!-- 底部装饰条 -->
  <rect x="0" y="780" width="1200" height="2" fill="url(#mainGradient)" opacity="0.4"/>
  
  <!-- 角落装饰 -->
  <g stroke="url(#mainGradient)" stroke-width="2" fill="none" opacity="0.4">
    <path d="M 40 40 L 80 40 L 80 70 M 40 40 L 40 80 L 60 80"/>
    <path d="M 1160 40 L 1120 40 L 1120 70 M 1160 40 L 1160 80 L 1140 80"/>
    <path d="M 40 760 L 80 760 L 80 730 M 40 760 L 40 720 L 60 720"/>
    <path d="M 1160 760 L 1120 760 L 1120 730 M 1160 760 L 1160 720 L 1140 720"/>
  </g>
  
  <!-- 免费标签 -->
  <g transform="translate(1050, 100)">
    <rect x="-40" y="-20" width="80" height="40" rx="20" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="5" text-anchor="middle" font-size="14" fill="#4ade80" font-weight="700">FREE</text>
  </g>
</svg>
