<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变 - 深空蓝黑 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050508;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a0a12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10101f;stop-opacity:1" />
    </linearGradient>
    
    <!-- 主色调 - 翡翠绿 + 青色 -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a8cc;stop-opacity:1" />
    </linearGradient>
    
    <!-- 强调色 - 琥珀金 -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8c00;stop-opacity:1" />
    </linearGradient>
    
    <!-- 警告色 -->
    <linearGradient id="warningGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4757;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b81;stop-opacity:1" />
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 强光效果 -->
    <filter id="brightGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 网格图案 -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,255,136,0.06)" stroke-width="1"/>
    </pattern>
    
    <!-- 扫描线效果 -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="2" x2="4" y2="2" stroke="rgba(0,255,136,0.03)" stroke-width="1"/>
    </pattern>
    
    <!-- 光晕环形 -->
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(0,255,136,0.25);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(0,255,136,0);stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bgGradient)"/>
  
  <!-- 网格层 -->
  <rect width="800" height="600" fill="url(#grid)"/>
  
  <!-- 扫描线层 -->
  <rect width="800" height="600" fill="url(#scanlines)"/>
  
  <!-- 背景光晕装饰 -->
  <circle cx="680" cy="120" r="180" fill="url(#ringGlow)" opacity="0.35"/>
  <circle cx="120" cy="480" r="140" fill="url(#ringGlow)" opacity="0.25"/>
  
  <!-- 中央主视觉 - 质量保障盾牌 + 代码块 -->
  <g transform="translate(400, 270)">
    <!-- 外环光晕动画 -->
    <circle r="150" fill="none" stroke="url(#primaryGradient)" stroke-width="1.5" opacity="0.25" filter="url(#glow)">
      <animate attributeName="opacity" values="0.25;0.45;0.25" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <!-- 旋转刻度环 -->
    <circle r="130" fill="none" stroke="url(#primaryGradient)" stroke-width="1" stroke-dasharray="15 12" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="30s" repeatCount="indefinite"/>
    </circle>
    
    <!-- 内环 -->
    <circle r="110" fill="none" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.35" filter="url(#glow)"/>
    
    <!-- 核心盾牌图标 -->
    <g filter="url(#brightGlow)">
      <!-- 盾牌轮廓 -->
      <path d="M 0 -80 L 60 -55 L 60 20 L 0 55 L -60 20 L -60 -55 Z" 
            fill="none" stroke="url(#primaryGradient)" stroke-width="3" opacity="0.9"/>
      
      <!-- 盾牌内部装饰 -->
      <path d="M 0 -65 L 45 -45 L 45 15 L 0 40 L -45 15 L -45 -45 Z" 
            fill="none" stroke="url(#primaryGradient)" stroke-width="1.5" opacity="0.5"/>
      
      <!-- 中心对勾标记 -->
      <path d="M -25 0 L -5 20 L 25 -15" 
            fill="none" stroke="url(#accentGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" 
            filter="url(#glow)"/>
      
      <!-- 盾牌顶部装饰 -->
      <circle cx="0" cy="-80" r="10" fill="url(#primaryGradient)" opacity="0.8"/>
    </g>
    
    <!-- 漂浮的代码块/切片 -->
    <g transform="translate(-140, -60)" opacity="0.7">
      <rect x="-35" y="-20" width="70" height="40" rx="4" fill="none" stroke="url(#primaryGradient)" stroke-width="1.5"/>
      <line x1="-25" y1="-8" x2="25" y2="-8" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.5"/>
      <line x1="-25" y1="4" x2="15" y2="4" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.5"/>
      <circle cx="-45" cy="0" r="6" fill="url(#primaryGradient)" opacity="0.6"/>
    </g>
    
    <g transform="translate(140, -40)" opacity="0.7">
      <rect x="-35" y="-20" width="70" height="40" rx="4" fill="none" stroke="url(#primaryGradient)" stroke-width="1.5"/>
      <line x1="-25" y1="-8" x2="25" y2="-8" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.5"/>
      <line x1="-25" y1="4" x2="15" y2="4" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.5"/>
      <circle cx="45" cy="0" r="6" fill="url(#accentGradient)" opacity="0.6"/>
    </g>
    
    <g transform="translate(-120, 80)" opacity="0.6">
      <rect x="-30" y="-18" width="60" height="36" rx="4" fill="none" stroke="url(#primaryGradient)" stroke-width="1.5"/>
      <line x1="-20" y1="-6" x2="20" y2="-6" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.5"/>
      <line x1="-20" y1="6" x2="12" y2="6" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.5"/>
    </g>
    
    <!-- 质量检查标记 -->
    <g transform="translate(100, 70)">
      <circle r="20" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.8"/>
      <path d="M -8 0 L -2 6 L 8 -5" fill="none" stroke="url(#accentGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  
  <!-- 质量仪表盘装饰 -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="120" height="80" rx="8" fill="rgba(0,255,136,0.05)" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.4"/>
    <text x="60" y="25" font-family="Arial, sans-serif" font-size="10" fill="#00ff88" text-anchor="middle" opacity="0.7">QUALITY</text>
    <rect x="15" y="40" width="90" height="8" rx="4" fill="rgba(0,255,136,0.1)"/>
    <rect x="15" y="40" width="78" height="8" rx="4" fill="url(#primaryGradient)" opacity="0.8"/>
    <text x="110" y="48" font-family="Arial, sans-serif" font-size="10" fill="#00ff88" text-anchor="end">85%</text>
  </g>
  
  <g transform="translate(580, 420)">
    <rect x="0" y="0" width="100" height="70" rx="8" fill="rgba(0,255,136,0.05)" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.4"/>
    <text x="50" y="22" font-family="Arial, sans-serif" font-size="9" fill="#00ff88" text-anchor="middle" opacity="0.7">COVERAGE</text>
    <rect x="12" y="35" width="76" height="7" rx="3.5" fill="rgba(0,255,136,0.1)"/>
    <rect x="12" y="35" width="68" height="7" rx="3.5" fill="url(#primaryGradient)" opacity="0.8"/>
    <text x="92" y="42" font-family="Arial, sans-serif" font-size="9" fill="#00ff88" text-anchor="end">92%</text>
  </g>
  
  <!-- 漂浮的代码元素 -->
  <g font-family="'Courier New', Consolas, monospace" font-size="12" opacity="0.45">
    <text x="60" y="520" fill="#00ff88">const quality = new QualityGuard()</text>
    <text x="500" y="80" fill="#00d4aa">await slice.verify()</text>
    <text x="70" y="550" fill="#ffb700">// TDD: Red → Green → Refactor</text>
    <text x="520" y="540" fill="#00a8cc">test覆盖率：92%</text>
  </g>
  
  <!-- 装饰性线条 -->
  <line x1="0" y1="1" x2="800" y2="1" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="599" x2="800" y2="599" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.3"/>
  
  <!-- 主标题 -->
  <text x="400" y="475" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="30" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">
    QualityGuard L3
  </text>
  
  <!-- 副标题 -->
  <text x="400" y="508" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" fill="#00ff88" text-anchor="middle" letter-spacing="3">
    垂直切片 × 自适应 TDD 质量保障
  </text>
  
  <!-- 底部标签 -->
  <g transform="translate(400, 545)">
    <rect x="-110" y="-12" width="220" height="24" rx="12" fill="rgba(0,255,136,0.1)" stroke="url(#primaryGradient)" stroke-width="1"/>
    <text x="0" y="5" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="11" fill="#00d4aa" text-anchor="middle" letter-spacing="2">
      AI Skill · TDD · 代码质量 · 垂直切片
    </text>
  </g>
  
  <!-- 角落装饰 -->
  <g stroke="url(#primaryGradient)" stroke-width="1" fill="none" opacity="0.5">
    <path d="M 20 20 L 60 20 L 60 25 M 20 20 L 20 60 L 25 60"/>
    <path d="M 780 20 L 740 20 L 740 25 M 780 20 L 780 60 L 775 60"/>
    <path d="M 20 580 L 60 580 L 60 575 M 20 580 L 20 540 L 25 540"/>
    <path d="M 780 580 L 740 580 L 740 575 M 780 580 L 780 540 L 775 540"/>
  </g>
  
  <!-- 状态指示灯 -->
  <g transform="translate(720, 50)">
    <circle cx="0" cy="0" r="5" fill="#00ff88" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="12" y="4" font-family="Arial, sans-serif" font-size="10" fill="#00ff88" opacity="0.6">SYSTEM ACTIVE</text>
  </g>
  
  <!-- 星星点缀 -->
  <g fill="#ffffff">
    <circle cx="150" cy="100" r="1.5" opacity="0.5"/>
    <circle cx="650" cy="150" r="1" opacity="0.4"/>
    <circle cx="220" cy="500" r="1.5" opacity="0.6"/>
    <circle cx="700" cy="460" r="1" opacity="0.5"/>
    <circle cx="520" cy="100" r="1.5" opacity="0.4"/>
  </g>
</svg>
