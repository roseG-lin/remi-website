<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    
    <!-- 主渐变 - 紫粉科技风 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="50%" style="stop-color:#e879f9"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    
    <!-- 辅助渐变 - 蓝紫色 -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 网格图案 -->
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(192,132,252,0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- 科技网格 -->
  <rect width="1200" height="800" fill="url(#grid)"/>
  
  <!-- 装饰性光晕 -->
  <circle cx="300" cy="200" r="250" fill="url(#mainGradient)" opacity="0.08" filter="url(#glow)"/>
  <circle cx="900" cy="600" r="300" fill="url(#accentGradient)" opacity="0.08" filter="url(#glow)"/>
  
  <!-- 中心对话气泡图标 -->
  <g transform="translate(600, 380)" filter="url(#glow)">
    <!-- 外环 -->
    <circle r="120" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.4"/>
    <circle r="90" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.6"/>
    
    <!-- 三个智能体节点 -->
    <g transform="translate(0, -50)">
      <circle r="25" fill="url(#mainGradient)" opacity="0.9"/>
      <text x="0" y="5" text-anchor="middle" fill="#0f0f1a" font-size="20" font-weight="bold">AI</text>
    </g>
    <g transform="translate(-60, 40)">
      <circle r="25" fill="url(#accentGradient)" opacity="0.9"/>
      <text x="0" y="5" text-anchor="middle" fill="#0f0f1a" font-size="20" font-weight="bold">AI</text>
    </g>
    <g transform="translate(60, 40)">
      <circle r="25" fill="url(#mainGradient)" opacity="0.9"/>
      <text x="0" y="5" text-anchor="middle" fill="#0f0f1a" font-size="20" font-weight="bold">AI</text>
    </g>
    
    <!-- 连接线 -->
    <g stroke="url(#mainGradient)" stroke-width="2" fill="none" opacity="0.6">
      <path d="M 0 -25 L -52 15"/>
      <path d="M 0 -25 L 52 15"/>
      <path d="M -52 15 L 52 15"/>
    </g>
    
    <!-- 中心连接点 -->
    <circle r="15" fill="url(#mainGradient)" filter="url(#glow)"/>
  </g>
  
  <!-- 对话气泡装饰 -->
  <g opacity="0.5">
    <ellipse cx="250" cy="300" rx="60" ry="35" fill="none" stroke="url(#accentGradient)" stroke-width="2" filter="url(#glow)"/>
    <ellipse cx="950" cy="250" rx="50" ry="30" fill="none" stroke="url(#mainGradient)" stroke-width="2" filter="url(#glow)"/>
    <ellipse cx="200" cy="550" rx="55" ry="32" fill="none" stroke="url(#mainGradient)" stroke-width="2" filter="url(#glow)"/>
    <ellipse cx="1000" cy="520" rx="65" ry="38" fill="none" stroke="url(#accentGradient)" stroke-width="2" filter="url(#glow)"/>
  </g>
  
  <!-- 数据流线条 -->
  <g stroke="url(#mainGradient)" stroke-width="1.5" opacity="0.3" filter="url(#glow)">
    <path d="M 150 150 L 250 180 L 280 220">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 1050 180 L 950 200 L 920 240">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 180 650 L 280 600 L 310 570">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 1020 620 L 920 580 L 890 550">
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- 标题文字 -->
  <text x="600" y="100" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="800" fill="url(#mainGradient)" filter="url(#glow)" letter-spacing="3">AGENT_WE</text>
  
  <!-- 副标题 -->
  <text x="600" y="135" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="400" fill="rgba(255,255,255,0.5)" letter-spacing="6">MULTI-AGENT CONVERSATION SYSTEM</text>
  
  <!-- 功能标签 -->
  <g transform="translate(600, 680)" text-anchor="middle">
    <rect x="-180" y="-20" width="120" height="40" rx="20" fill="rgba(192,132,252,0.1)" stroke="url(#mainGradient)" stroke-width="1.5"/>
    <text x="0" y="5" font-size="13" fill="url(#mainGradient)" font-weight="500">💖 情绪陪伴</text>
    
    <rect x="-40" y="-20" width="120" height="40" rx="20" fill="rgba(129,140,248,0.1)" stroke="url(#accentGradient)" stroke-width="1.5"/>
    <text x="20" y="5" font-size="13" fill="url(#accentGradient)" font-weight="500">💼 工作讨论</text>
    
    <rect x="100" y="-20" width="120" height="40" rx="20" fill="rgba(244,114,182,0.1)" stroke="url(#mainGradient)" stroke-width="1.5"/>
    <text x="160" y="5" font-size="13" fill="url(#mainGradient)" font-weight="500">🎛️ 智能管理</text>
  </g>
  
  <!-- 底部装饰条 -->
  <rect x="0" y="780" width="1200" height="2" fill="url(#mainGradient)" opacity="0.4"/>
  
  <!-- 角落装饰 -->
  <g stroke="url(#mainGradient)" stroke-width="2" fill="none" opacity="0.4">
    <path d="M 40 40 L 80 40 L 80 70 M 40 40 L 40 80 L 60 80"/>
    <path d="M 1160 40 L 1120 40 L 1120 70 M 1160 40 L 1160 80 L 1140 80"/>
    <path d="M 40 760 L 80 760 L 80 730 M 40 760 L 40 720 L 60 720"/>
    <path d="M 1160 760 L 1120 760 L 1120 730 M 1160 760 L 1160 720 L 1140 720"/>
  </g>
</svg>
