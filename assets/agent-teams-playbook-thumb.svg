<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="50%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    
    <!-- 主渐变 - 紫粉编排主题 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#9333ea"/>
    </linearGradient>
    
    <!-- 辅助渐变 - 青蓝色 -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 网格图案 -->
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(168,85,247,0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- 科技网格 -->
  <rect width="1200" height="800" fill="url(#grid)"/>
  
  <!-- 装饰性光晕 -->
  <circle cx="300" cy="400" r="280" fill="url(#mainGradient)" opacity="0.08" filter="url(#glow)"/>
  <circle cx="900" cy="350" r="300" fill="url(#accentGradient)" opacity="0.08" filter="url(#glow)"/>
  
  <!-- 中心图标 - 编排网络 -->
  <g transform="translate(600, 400)" filter="url(#glow)">
    <!-- 外环 -->
    <circle r="150" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.3"/>
    <circle r="120" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.5"/>
    <circle r="90" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.7"/>
    
    <!-- 中心节点 -->
    <circle r="40" fill="url(#mainGradient)" opacity="0.2"/>
    <circle r="25" fill="url(#mainGradient)" opacity="0.4"/>
    <circle r="12" fill="url(#mainGradient)"/>
    
    <!-- 卫星节点 -->
    <g opacity="0.8">
      <!-- 上方节点 - find-skills -->
      <circle cx="0" cy="-90" r="18" fill="url(#accentGradient)"/>
      <text x="0" y="-85" text-anchor="middle" font-size="10" fill="white" font-weight="bold">🔍</text>
      
      <!-- 右上节点 - planning -->
      <circle cx="78" cy="-45" r="18" fill="url(#mainGradient)"/>
      <text x="78" y="-40" text-anchor="middle" font-size="10" fill="white" font-weight="bold">📝</text>
      
      <!-- 右下节点 - execution -->
      <circle cx="78" cy="45" r="18" fill="url(#accentGradient)"/>
      <text x="78" y="50" text-anchor="middle" font-size="10" fill="white" font-weight="bold">⚡</text>
      
      <!-- 下方节点 - quality -->
      <circle cx="0" cy="90" r="18" fill="url(#mainGradient)"/>
      <text x="0" y="95" text-anchor="middle" font-size="10" fill="white" font-weight="bold">✅</text>
      
      <!-- 左下节点 - superpowers -->
      <circle cx="-78" cy="45" r="18" fill="url(#accentGradient)"/>
      <text x="-78" y="50" text-anchor="middle" font-size="10" fill="white" font-weight="bold">🎯</text>
      
      <!-- 左上节点 - orchestration -->
      <circle cx="-78" cy="-45" r="18" fill="url(#mainGradient)"/>
      <text x="-78" y="-40" text-anchor="middle" font-size="10" fill="white" font-weight="bold">🎬</text>
    </g>
    
    <!-- 连接线 -->
    <g stroke="url(#mainGradient)" stroke-width="1.5" opacity="0.5">
      <line x1="0" y1="-40" x2="0" y2="-72"/>
      <line x1="21" y1="-21" x2="65" y2="-32"/>
      <line x1="21" y1="21" x2="65" y2="32"/>
      <line x1="0" y1="40" x2="0" y2="72"/>
      <line x1="-21" y1="21" x2="-65" y2="32"/>
      <line x1="-21" y1="-21" x2="-65" y2="-32"/>
    </g>
  </g>
  
  <!-- 数据流线条 -->
  <g stroke="url(#mainGradient)" stroke-width="1.5" opacity="0.3" filter="url(#glow)">
    <path d="M 200 200 L 300 250 L 350 300">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 1000 250 L 900 280 L 850 320">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 250 600 L 350 550 L 400 520">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 950 580 L 850 530 L 800 500">
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- 五件套流程带 -->
  <g transform="translate(600, 580)" opacity="0.6">
    <rect x="-180" y="-15" width="70" height="30" rx="15" fill="rgba(168,85,247,0.15)" stroke="url(#mainGradient)" stroke-width="1.5"/>
    <text x="-145" y="5" text-anchor="middle" font-size="10" fill="url(#mainGradient)" font-weight="500">find-skills</text>
    
    <rect x="-100" y="-15" width="70" height="30" rx="15" fill="rgba(45,212,191,0.15)" stroke="url(#accentGradient)" stroke-width="1.5"/>
    <text x="-65" y="5" text-anchor="middle" font-size="10" fill="url(#accentGradient)" font-weight="500">planning</text>
    
    <rect x="-20" y="-15" width="70" height="30" rx="15" fill="rgba(168,85,247,0.15)" stroke="url(#mainGradient)" stroke-width="1.5"/>
    <text x="15" y="5" text-anchor="middle" font-size="10" fill="url(#mainGradient)" font-weight="500">orchestrate</text>
    
    <rect x="60" y="-15" width="70" height="30" rx="15" fill="rgba(45,212,191,0.15)" stroke="url(#accentGradient)" stroke-width="1.5"/>
    <text x="95" y="5" text-anchor="middle" font-size="10" fill="url(#accentGradient)" font-weight="500">execute</text>
    
    <rect x="140" y="-15" width="70" height="30" rx="15" fill="rgba(168,85,247,0.15)" stroke="url(#mainGradient)" stroke-width="1.5"/>
    <text x="175" y="5" text-anchor="middle" font-size="10" fill="url(#mainGradient)" font-weight="500">verify</text>
  </g>
  
  <!-- 标题文字 -->
  <text x="600" y="100" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="800" fill="url(#mainGradient)" filter="url(#glow)" letter-spacing="2">AGENT TEAMS PLAYBOOK</text>
  
  <!-- 副标题 -->
  <text x="600" y="135" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" fill="rgba(255,255,255,0.5)" letter-spacing="4">Agent Teams 编排器 - 五件套自动编排核心</text>
  
  <!-- 功能标签 -->
  <g transform="translate(600, 650)" text-anchor="middle">
    <rect x="-180" y="-20" width="110" height="40" rx="20" fill="rgba(168,85,247,0.1)" stroke="url(#mainGradient)" stroke-width="1.5"/>
    <text x="-125" y="5" font-size="12" fill="url(#mainGradient)" font-weight="500">🧠 智能决策</text>
    
    <rect x="-55" y="-20" width="110" height="40" rx="20" fill="rgba(45,212,191,0.1)" stroke="url(#accentGradient)" stroke-width="1.5"/>
    <text x="0" y="5" font-size="12" fill="url(#accentGradient)" font-weight="500">👥 多 Agent</text>
    
    <rect x="70" y="-20" width="110" height="40" rx="20" fill="rgba(168,85,247,0.1)" stroke="url(#mainGradient)" stroke-width="1.5"/>
    <text x="125" y="5" font-size="12" fill="url(#mainGradient)" font-weight="500">📊 可追踪</text>
  </g>
  
  <!-- 底部装饰条 -->
  <rect x="0" y="780" width="1200" height="2" fill="url(#mainGradient)" opacity="0.4"/>
  
  <!-- 角落装饰 -->
  <g stroke="url(#mainGradient)" stroke-width="2" fill="none" opacity="0.4">
    <path d="M 40 40 L 80 40 L 80 70 M 40 40 L 40 80 L 60 80"/>
    <path d="M 1160 40 L 1120 40 L 1120 70 M 1160 40 L 1160 80 L 1140 80"/>
    <path d="M 40 760 L 80 760 L 80 730 M 40 760 L 40 720 L 60 720"/>
    <path d="M 1160 760 L 1120 760 L 1120 730 M 1160 760 L 1160 720 L 1140 720"/>
  </g>
</svg>
