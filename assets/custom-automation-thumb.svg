<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主渐变 - 科技蓝绿 -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    
    <!-- 数据流渐变 -->
    <linearGradient id="data-flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff88" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    
    <!-- 邮件图标渐变 -->
    <linearGradient id="email-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00a8cc"/>
    </linearGradient>
    
    <!-- 文档图标渐变 -->
    <linearGradient id="doc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    
    <!-- 自动化图标渐变 -->
    <linearGradient id="auto-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    
    <!-- 光晕渐变 -->
    <radialGradient id="glow-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    
    <!-- 扫描线渐变 -->
    <linearGradient id="scan-line" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff88" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </linearGradient>
    
    <!-- 网格渐变 -->
    <linearGradient id="grid-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#00ff88" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0.1"/>
    </linearGradient>
    
    <!-- 模糊滤镜 -->
    <filter id="glow-blur">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bg-gradient)"/>
  
  <!-- 网格背景 -->
  <g stroke="url(#grid-line)" stroke-width="1" opacity="0.3">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  
  <!-- 中心光晕 -->
  <circle cx="400" cy="300" r="150" fill="url(#glow-grad)" opacity="0.5"/>
  
  <!-- 数据流线条 -->
  <g class="data-stream">
    <path d="M100 150 L200 200 L300 180 L400 220 L500 200 L600 240 L700 220" 
          stroke="url(#data-flow)" stroke-width="2" fill="none" opacity="0.6">
      <animate attributeName="d" 
               values="M100 150 L200 200 L300 180 L400 220 L500 200 L600 240 L700 220;
                       M100 160 L200 210 L300 190 L400 230 L500 210 L600 250 L700 230;
                       M100 150 L200 200 L300 180 L400 220 L500 200 L600 240 L700 220"
               dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M100 350 L200 380 L300 360 L400 400 L500 380 L600 420 L700 400" 
          stroke="url(#data-flow)" stroke-width="2" fill="none" opacity="0.6">
      <animate attributeName="d" 
               values="M100 350 L200 380 L300 360 L400 400 L500 380 L600 420 L700 400;
                       M100 360 L200 390 L300 370 L400 410 L500 390 L600 430 L700 410;
                       M100 350 L200 380 L300 360 L400 400 L500 380 L600 420 L700 400"
               dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M100 450 L200 480 L300 460 L400 500 L500 480 L600 520 L700 500" 
          stroke="url(#data-flow)" stroke-width="2" fill="none" opacity="0.4">
      <animate attributeName="d" 
               values="M100 450 L200 480 L300 460 L400 500 L500 480 L600 520 L700 500;
                       M100 460 L200 490 L300 470 L400 510 L500 490 L600 530 L700 510;
                       M100 450 L200 480 L300 460 L400 500 L500 480 L600 520 L700 500"
               dur="6s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- 邮件处理模块 -->
  <g class="module email-module" transform="translate(200, 200)" filter="url(#glow-blur)">
    <rect x="-40" y="-40" width="80" height="80" rx="12" fill="rgba(0,255,136,0.05)" 
          stroke="url(#email-grad)" stroke-width="2"/>
    <rect x="-25" y="-20" width="50" height="35" rx="3" fill="none" stroke="url(#email-grad)" stroke-width="2"/>
    <path d="M-25 -8 L0 10 L25 -8" stroke="url(#email-grad)" stroke-width="2" fill="none"/>
    <circle cx="30" cy="-30" r="8" fill="url(#email-grad)" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 单证解析模块 -->
  <g class="module doc-module" transform="translate(400, 280)" filter="url(#glow-blur)">
    <rect x="-40" y="-40" width="80" height="80" rx="12" fill="rgba(0,255,136,0.05)" 
          stroke="url(#doc-grad)" stroke-width="2"/>
    <path d="M-20 -25 L10 -25 L20 -15 L20 25 L-20 25 Z" fill="none" stroke="url(#doc-grad)" stroke-width="2"/>
    <path d="M10 -25 L10 -15 L20 -15" fill="none" stroke="url(#doc-grad)" stroke-width="1.5"/>
    <line x1="-10" y1="-5" x2="15" y2="-5" stroke="url(#doc-grad)" stroke-width="1.5"/>
    <line x1="-10" y1="5" x2="15" y2="5" stroke="url(#doc-grad)" stroke-width="1.5"/>
    <line x1="-10" y1="15" x2="5" y2="15" stroke="url(#doc-grad)" stroke-width="1.5"/>
    <circle cx="30" cy="-30" r="8" fill="url(#doc-grad)" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- RPA 自动化模块 -->
  <g class="module rpa-module" transform="translate(600, 200)" filter="url(#glow-blur)">
    <rect x="-40" y="-40" width="80" height="80" rx="12" fill="rgba(255,140,66,0.05)" 
          stroke="url(#auto-grad)" stroke-width="2"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="url(#auto-grad)" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" 
                        dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="12" fill="none" stroke="url(#auto-grad)" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" 
                        dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="4" fill="#FFD700"/>
    <circle cx="30" cy="-30" r="8" fill="url(#auto-grad)" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 数据连接线 -->
  <g stroke="#00ff88" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M240 200 C320 200 320 280 360 280">
      <animate attributeName="stroke-dasharray" values="0,200;200,0;0,200" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M440 280 C520 280 520 200 560 200">
      <animate attributeName="stroke-dasharray" values="0,200;200,0;0,200" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- 扫描线 -->
  <rect x="0" y="0" width="800" height="4" fill="url(#scan-line)" opacity="0.5">
    <animate attributeName="y" from="0" to="600" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <!-- 底部数据面板 -->
  <g class="data-panel" transform="translate(100, 480)" opacity="0.8">
    <rect x="0" y="0" width="600" height="80" rx="8" fill="rgba(0,255,136,0.03)" 
          stroke="rgba(0,255,136,0.2)" stroke-width="1"/>
    
    <!-- 进度条 1 -->
    <rect x="30" y="25" width="150" height="6" rx="3" fill="rgba(0,255,136,0.1)"/>
    <rect x="30" y="25" width="120" height="6" rx="3" fill="url(#email-grad)">
      <animate attributeName="width" values="120;140;120" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="30" y="20" fill="#00ff88" font-size="10" font-family="system-ui">邮件处理</text>
    
    <!-- 进度条 2 -->
    <rect x="220" y="25" width="150" height="6" rx="3" fill="rgba(0,255,136,0.1)"/>
    <rect x="220" y="25" width="100" height="6" rx="3" fill="url(#doc-grad)">
      <animate attributeName="width" values="100;130;100" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="220" y="20" fill="#00ff88" font-size="10" font-family="system-ui">单证解析</text>
    
    <!-- 进度条 3 -->
    <rect x="410" y="25" width="150" height="6" rx="3" fill="rgba(255,140,66,0.1)"/>
    <rect x="410" y="25" width="110" height="6" rx="3" fill="url(#auto-grad)">
      <animate attributeName="width" values="110;140;110" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <text x="410" y="20" fill="#FF8C42" font-size="10" font-family="system-ui">RPA 自动化</text>
    
    <!-- 状态指示器 -->
    <circle cx="580" cy="28" r="6" fill="#00ff88" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="580" y="55" fill="#00ff88" font-size="9" font-family="system-ui" text-anchor="middle">运行中</text>
  </g>
  
  <!-- 角落装饰 -->
  <g stroke="#00ff88" stroke-width="1" fill="none" opacity="0.4">
    <path d="M20 20 L60 20 L60 25 M20 20 L20 60 M25 60 L20 60 L20 20"/>
    <path d="M780 20 L740 20 L740 25 M780 20 L780 60 M775 60 L780 60 L780 20"/>
    <path d="M20 580 L60 580 L60 575 M20 580 L20 540 M25 540 L20 540 L20 580"/>
    <path d="M780 580 L740 580 L740 575 M780 580 L780 540 M775 540 L780 540 L780 580"/>
  </g>
  
  <!-- 浮动粒子 -->
  <g fill="#00ff88">
    <circle cx="150" cy="100" r="2" opacity="0.6">
      <animate attributeName="cy" values="100;90;100" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="120" r="2" opacity="0.6">
      <animate attributeName="cy" values="120;130;120" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="400" r="1.5" opacity="0.4">
      <animate attributeName="cy" values="400;390;400" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.2;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="380" r="1.5" opacity="0.4">
      <animate attributeName="cy" values="380;390;380" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.2;0.4" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 标题文字 -->
  <text x="400" y="570" fill="#00ff88" font-size="12" font-family="system-ui" 
        text-anchor="middle" letter-spacing="2" opacity="0.6">
    AUTOMATION SYSTEM · 智能自动化
  </text>
</svg>
